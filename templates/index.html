<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

  <!-- Auth Overlay -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-modal">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
      </div>
      <h2 class="auth-brand">AI Chat</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn" data-i18n="auth_sign_in">Sign In</button>
        <button class="auth-tab" id="tabSignUp" data-i18n="auth_sign_up">Sign Up</button>
      </div>

      <form id="signInForm" class="auth-form">
        <div class="auth-field">
          <input type="email" id="siEmail" data-i18n-placeholder="auth_email" placeholder="Email" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <input type="password" id="siPassword" data-i18n-placeholder="auth_password" placeholder="Password" autocomplete="current-password" required />
        </div>
        <p class="auth-error" id="siError"></p>
        <button type="submit" class="auth-submit-btn" data-i18n="auth_sign_in">Sign In</button>
      </form>

      <form id="signUpForm" class="auth-form" style="display:none">
        <div class="auth-field">
          <input type="text" id="suUsername" data-i18n-placeholder="auth_username" placeholder="Username" autocomplete="username" required />
        </div>
        <div class="auth-field">
          <input type="email" id="suEmail" data-i18n-placeholder="auth_email" placeholder="Email" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <input type="password" id="suPassword" data-i18n-placeholder="auth_password" placeholder="Password" autocomplete="new-password" minlength="6" required />
        </div>
        <p class="auth-error" id="suError"></p>
        <button type="submit" class="auth-submit-btn" data-i18n="auth_sign_up">Sign Up</button>
      </form>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span data-i18n="new_chat">Новый чат</span>
      </button>
    </div>

    <div class="sidebar-body">
      <!-- Projects -->
      <div class="projects-area">
        <div class="sidebar-section-label" data-i18n="projects_label">Проекты</div>
        <div id="projectsList"></div>
        <button class="new-project-btn" id="newProjectBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/>
            <line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
          <span data-i18n="new_project">Новый проект</span>
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Chat history -->
      <div class="chat-history" id="chatHistory">
        <p class="history-empty" data-i18n="history_empty">История чатов появится здесь</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="clear-history-btn" id="clearHistoryBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        <span data-i18n="clear_history">Очистить историю</span>
      </button>
      <div class="user-info" id="userInfo" title="Settings">
        <div class="avatar">A</div>
        <span id="userDisplayName">AI Chat</span>
        <svg class="settings-gear" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
        </svg>
      </button>
      <button class="sidebar-toggle-mobile" id="sidebarToggleMobile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="model-badge" data-i18n="agent_label">AI Agent</span>

      <!-- Language selector -->
      <div class="lang-selector" id="langSelector">
        <button class="lang-btn" id="langBtn" aria-label="Select language">
          <span id="langFlag">🇷🇺</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option" data-lang="ru">🇷🇺 Русский</button>
          <button class="lang-option" data-lang="en">🇬🇧 English</button>
          <button class="lang-option" data-lang="kk">🇰🇿 Қазақша</button>
        </div>
      </div>
    </header>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
        </div>
        <h1 data-i18n="welcome_title">Чем могу помочь?</h1>
        <div class="suggestion-grid">
          <button class="suggestion-card"
            data-i18n-text="suggestion_exam_text"
            data-text="Составь план подготовки к экзамену по физике за 3 дня">
            <span class="suggestion-icon">📚</span>
            <span data-i18n="suggestion_exam">Подготовься к экзамену</span>
          </button>
          <button class="suggestion-card"
            data-i18n-text="suggestion_explain_text"
            data-text="Объясни производную функции простыми словами с примером">
            <span class="suggestion-icon">🧮</span>
            <span data-i18n="suggestion_explain">Объясни тему с примером</span>
          </button>
          <button class="suggestion-card"
            data-i18n-text="suggestion_stress_text"
            data-text="Как справиться со стрессом и тревогой перед экзаменами?">
            <span class="suggestion-icon">🎓</span>
            <span data-i18n="suggestion_stress">Как справиться со стрессом</span>
          </button>
          <button class="suggestion-card"
            data-i18n-text="suggestion_scholarships_text"
            data-text="Какие стипендии доступны для студентов в 2025 году?">
            <span class="suggestion-icon">🔍</span>
            <span data-i18n="suggestion_scholarships">Найди стипендии для студентов</span>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          data-i18n-placeholder="input_placeholder"
          placeholder="Напишите сообщение..."
          rows="1"
          maxlength="100000"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer" data-i18n="disclaimer">AI может ошибаться. Проверяйте важную информацию.</p>
    </div>
  </main>

  <button class="scroll-to-bottom" id="scrollToBottom" aria-label="Прокрутить вниз">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/script.js"></script>
</body>
</html>
