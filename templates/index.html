<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Новый чат
      </button>
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-body">
      <!-- Projects -->
      <div class="projects-area">
        <div class="sidebar-section-label">Проекты</div>
        <div id="projectsList"></div>
        <button class="new-project-btn" id="newProjectBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/>
            <line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
          Новый проект
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Chat history -->
      <div class="chat-history" id="chatHistory">
        <p class="history-empty">История чатов появится здесь</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="clear-history-btn" id="clearHistoryBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Очистить историю
      </button>
      <div class="user-info">
        <div class="avatar">A</div>
        <span>AI Chat</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="sidebar-toggle-mobile" id="sidebarToggleMobile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="model-badge">AI Agent</span>
    </header>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
        </div>
        <h1>Чем могу помочь?</h1>
        <div class="suggestion-grid">
          <button class="suggestion-card" data-text="Объясни квантовые вычисления простыми словами">
            <span class="suggestion-icon">⚛️</span>
            Объясни квантовые вычисления
          </button>
          <button class="suggestion-card" data-text="Напиши функцию на Python для сортировки списка">
            <span class="suggestion-icon">🐍</span>
            Напиши код на Python
          </button>
          <button class="suggestion-card" data-text="Придумай короткий рассказ о путешествии во времени">
            <span class="suggestion-icon">✍️</span>
            Напиши творческий рассказ
          </button>
          <button class="suggestion-card" data-text="Составь план для запуска небольшого онлайн-бизнеса">
            <span class="suggestion-icon">💡</span>
            Помоги с бизнес-планом
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          placeholder="Напишите сообщение..."
          rows="1"
          maxlength="100000"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">AI может ошибаться. Проверяйте важную информацию.</p>
    </div>
  </main>

  <button class="scroll-to-bottom" id="scrollToBottom" aria-label="Прокрутить вниз">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/script.js"></script>
</body>
</html>
